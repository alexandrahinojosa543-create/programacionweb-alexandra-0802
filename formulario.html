<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programaci&oacute;n web | Formularios en HTML</title>
</head>
<body>
    <div id="main-content">
        <h1>Implementaci&oacute;n de formularios en HTML </h1>
        <h2>
            Permiten la interacci&oacute;n con el usuario, solicitando informaci&oacute;n 
        </h2>
        <hr>
        <section class="form-tag">
            <form action="url"  method="post" class="formulario">
                <fieldset>
                    <legend>Formulario e html - Obtener datos</legend>
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" required placeholder="Ejemplo: Alexandra Hinojosa Becerril" onkeyup="BuscarCliente (this.value)"/> 
                    <br> 
                    <br>
            

                    <label for="clave">Contrase&ntilde;a </label>
                    <input type="password" name="clave" id="clave" required disabled>
                    <br> <br>
                    <label for="edad">Edad</label>
                    <input type="number" name="id" id="edad" max="85" min="18" step="2" value="18" readonly>
                    <br><br>

                    <label for="municipio">Municipio</label>
                    <select id="municipio" required>
                        <option value="1">Seleccione su Municipio</option>
                        <option value="2">Jocotitl&aacute;n</option>
                        <option value="3">Temaoya</option>
                        <option value="4">Ixtlahuaca</option>
                        <option value="5" selected>Temoaya</option>
                    </select>
                    <br><br>
                    <label for="habilididades">Habilidades </label>
                    <select name="" id="habilididades" multiple>
                        <option value="0">Seleccione sus Habilidades</option>
                        <option value="1">Dise&ntilde;o</option>
                        <option value="2">Programaci&oacute;n</option>
                        <option value="3">Seguridad Inform&aacute;tica</option>
                    </select>
                    <br><br>
                    <label for="correo">Correos</label>
                    <input type="email" name="correo" placeholder="usuario@dominio.ext" autofocus>
                    <br><br>
                    <label for="nacimiento">Fecha de nacimiento</label>
                    <input type="date" name="" id="nacimiento" min="2000-01-01" max="2002-01-01" value="2001-12-12"> 
                    <br><br>

                    Adjunta Imagen <input type="file" name="" id="">
                    <br><br>
                    Indique su (s) deportes favoritos:
                    Tenis <input type="checkbox" name="deportes" id="" value="1">
                    Nataci&oacute;n <input type="checkbox" name="deportes" id="" value="2">
                    Tiro con arco <input type="checkbox" name="deportes" id="" value="3">
                    <br><br>
                    Selecciones su g&eacute;nero: 
                    Mujer <input type="radio" name="genero" id="" value="1">
                    Hombre <input type="radio" name="genero" id="" value="2">
                    <br><br>
                    Mensaje <br>
                    <textarea name="" id="" cols="30" rows="5"></textarea>
                    <br><br>
                    Seleccione un color 
                    <input type="color" name="" id="">

                    <br><br>

                    <input type="submit" value="Enviar" />
                    <input type="button" value="Cerrar"  onclick="ejemplo()"/>
                    <input type="reset" value="Borrar Datos del Formularios">
                </fieldset>

            </form>
        </section>

    </div>
    <script src="js/app.js"></script>
    
</body>
</html>
