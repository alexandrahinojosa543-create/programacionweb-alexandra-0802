<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programaci&oacute;n web | Objetos en HTML</title>

</head>
<body>
    <div>
        <h1>Implementaci&oacute;n de Objetos HTML</h1>
        <h2>Son &uacute;tiles para implementar elementos externos 
            como: Im&aacute;genes, Videos, P&aacute;aginas.  En un archivo web
        </h2>
        <hr>
        <section class="table-tag">
            <object data="tabla.html" width="500" height="350"></object>
        </section>

        <br>
        <h2>Implementaci&oacute;n de video en HTML</h2>
        <section class="video-tag">
            <video width="600" height="350" controls>
                <iframe src="https://youtu.be/yJcoqOBklK4?si=jplo1VPAC2tRbgh9" width="600" height="300"></iframe>
                El navegador no permite el elemneto para video
            </video>
        </section>
        <section id="tag-audio">
            <audio src="ruta" controls>
                <source src="ruta" type="audio/mpeg">
            </audio>
        </section>
    </div>
    
</body>
</html>
